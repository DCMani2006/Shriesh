<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>by Mrs. Jaiswal</title>

    <!-- LINK CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- MAIN GAME CONTAINER -->
    <div id="game">
        <!-- 🌙 WELCOME SCREEN -->
        <div id="welcomeScreen">
            <div class="welcomeGlowLayer" aria-hidden="true">
                <span class="glowDot dot1"></span>
                <span class="glowDot dot2"></span>
                <span class="glowDot dot3"></span>
                <span class="glowDot dot4"></span>
                <span class="glowDot dot5"></span>
                <span class="glowDot dot6"></span>
            </div>
            <div class="welcomeContent">
                <h1>Hello Shriesh Kumar Jaiswal</h1>
                <p>
                    I made a little something<br><br>
                    Take your time with it<br>
                    Walk slowly<br>
                    Use the arrow keys to move
                </p>
                <button id="startButton">begin</button>
            </div>
        </div>
        <!-- CANVAS (WHERE EVERYTHING HAPPENS) -->
        <canvas id="gameCanvas"></canvas>

        <!-- TEXT POPUP -->
        <div id="textBox" class="hidden"></div>

        <!-- PROGRESSION HUD -->
        <div id="hud" class="hidden">
            <div id="chapterBadge">chapter: prologue</div>
            <div id="progressBadge">story: 0 / 0</div>
            <div id="gateBadge">next: story begins</div>
            <div id="speedControls" class="hudControlPanel">
                <div class="hudControlRow">
                    <span>fox speed</span>
                    <button id="foxSpeedDown" type="button">-</button>
                    <span id="foxSpeedValue">2.5</span>
                    <button id="foxSpeedUp" type="button">+</button>
                </div>
                <div class="hudControlRow">
                    <span>story pace</span>
                    <button id="storySpeedDown" type="button">-</button>
                    <span id="storySpeedValue">1.0x</span>
                    <button id="storySpeedUp" type="button">+</button>
                </div>
            </div>
        </div>

        <!-- PUZZLE UI -->
        <div id="puzzleUI" class="hidden"></div>

        <!-- FINAL BUTTON -->
        <button id="finalButton" class="hidden">
            a gift for you
        </button>

        <!-- VIDEO -->
        <video id="finalVideo" class="hidden" controls preload="none" playsinline>
            <source src="assets/video/final.mp4" type="video/mp4">
        </video>
        <button id="closeVideoButton" class="hidden">close</button>

    </div>

    <!-- LINK JS -->
    <script src="script.js"></script>

</body>
</html>
